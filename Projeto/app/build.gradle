plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'jacoco'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'org.unicamp.unicamp.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

tasks.named('run') {
    // Permite que o Gradle repasse a entrada do teclado (System.in) para o Scanner do Java
    standardInput = System.in
}

jacoco {
    toolVersion = "0.8.14" // Verifique a versão mais recente
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport // Relatório gerado após testes
}

jacocoTestReport {
    dependsOn test // Testes devem rodar antes do relatório
    reports {
        xml.required = true
        html.required = true
    }
}